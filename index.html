<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🚨 INFINITE LOOP ERROR 🚨</title>
    <style>
        /* 背景を強制的にレインボー点滅させるアニメーション */
        @keyframes rainbow {
            0% { background-color: #ff0000; }
            20% { background-color: #00ff00; }
            40% { background-color: #0000ff; }
            60% { background-color: #ffff00; }
            80% { background-color: #ff00ff; }
            100% { background-color: #ff0000; }
        }
        body {
            background-color: #111;
            color: #00ff00;
            overflow: hidden;
            font-family: 'Comic Sans MS', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .rainbow-active {
            animation: rainbow 0.15s linear infinite !important;
        }
        /* 巨大化したキャラクターたち */
        .mega-sprite {
            position: absolute;
            font-size: 120px;
            user-select: none;
            z-index: 100;
        }
        /* 👍ボタンの大増殖 */
        .like-btn {
            padding: 10px 20px;
            font-size: 24px;
            cursor: pointer;
            background-color: #ff0055;
            color: white;
            border: 5px outset #fff;
            margin: 2px;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            max-height: 80vh;
            overflow: hidden;
            z-index: 10;
        }
        /* 画面を埋め尽くす偽のエラーウィンドウ */
        .fake-window {
            position: absolute;
            width: 300px;
            background: #cbd3df;
            border: 3px inset #fff;
            color: black;
            font-family: 'MS Sans Serif', sans-serif;
            font-size: 14px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            z-index: 200;
        }
        .window-header {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .window-body {
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }
        /* 激しい画面揺れ */
        @keyframes super-shake {
            0% { transform: translate(10px, 10px) rotate(2deg); }
            25% { transform: translate(-10px, -10px) rotate(-2deg); }
            50% { transform: translate(-15px, 10px) rotate(3deg); }
            75% { transform: translate(10px, -10px) rotate(-3deg); }
            100% { transform: translate(10px, 10px) rotate(2deg); }
        }
        .ultra-collapse {
            animation: super-shake 0.03s infinite !important;
        }
    </style>
</head>
<body id="target-body">

    <div id="btn-container" class="container">
        <!-- 初期状態のボタン（JavaScriptから再生成できるように関数化しています） -->
    </div>

    <script>
        const body = document.getElementById('target-body');
        const container = document.getElementById('btn-container');
        let sprites = [];
        let chaosTimers = []; // タイマーを管理してリセットできるようにする
        const chaosEmojis = ['🦊', '👹', '🦋', '🦟', '💥', '💀', '👽'];

        // --- 1. 初期状態（平和な世界）を作る関数 ---
        function initPeacefulWorld() {
            // 全てをクリア
            container.innerHTML = '';
            body.className = '';
            body.style.backgroundColor = '#111';
            sprites.forEach(s => s.element.remove());
            sprites = [];
            chaosTimers.forEach(t => clearInterval(t));
            chaosTimers = [];
            
            // 偽ウィンドウが残ってたら全部消す
            document.querySelectorAll('.fake-window').forEach(w => w.remove());

            // 最初の👍ボタンを配置
            const mainBtn = document.createElement('button');
            mainBtn.className = 'like-btn';
            mainBtn.style.fontSize = '50px';
            mainBtn.style.padding = '30px';
            mainBtn.innerText = '👍 いいね！';
            mainBtn.onclick = goAbsoluteChaos;
            container.appendChild(mainBtn);

            // 🦋たちを20匹生成して静かに動かす
            for (let i = 0; i < 20; i++) {
                const s = document.createElement('div');
                s.className = 'mega-sprite';
                s.style.fontSize = '40px'; // 最初は小さめ
                s.innerText = '🦋';
                s.style.left = Math.random() * window.innerWidth + 'px';
                s.style.top = Math.random() * window.innerHeight + 'px';
                document.body.appendChild(s);
                
                sprites.push({
                    element: s,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    speedX: (Math.random() - 0.5) * 8,
                    speedY: (Math.random() - 0.5) * 8
                });
            }
        }

        // キャラクタを動かし続けるループ（常時起動）
        function mainLoop() {
            sprites.forEach(s => {
                s.x += s.speedX;
                s.y += s.speedY;
                if (s.x < -50 || s.x > window.innerWidth - 50) s.speedX *= -1;
                if (s.y < -50 || s.y > window.innerHeight - 50) s.speedY *= -1;
                
                // カオス状態のときは超回転、通常時は少し揺れるだけ
                if (body.classList.contains('ultra-collapse')) {
                    s.element.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${Date.now() * 0.5}deg)`;
                } else {
                    s.element.style.transform = `translate(${s.x}px, ${s.y}px)`;
                }
            });
            requestAnimationFrame(mainLoop);
        }

        // --- 2. ボタンクリック：絶対カオス発動 ---
        function goAbsoluteChaos() {
            container.innerHTML = ''; // 最初のボタンを破壊

            // 👍ボタンを100個に超増殖
            for (let i = 0; i < 100; i++) {
                const b = document.createElement('button');
                b.className = 'like-btn';
                b.innerText = '👍 いいね！';
                container.appendChild(b);
            }

            // 既存の🦋を巨大化させ、速度をMAXにして他の化け物（🦊や👹）に変身させる
            sprites.forEach(s => {
                s.element.style.fontSize = '120px';
                s.element.innerText = chaosEmojis[Math.floor(Math.random() * chaosEmojis.length)];
                s.speedX *= 6;
                s.speedY *= 6;
            });

            // レインボー点滅と画面超振動を開始
            body.classList.add('rainbow-active');
            body.classList.add('ultra-collapse');

            // 偽エラーウィンドウの超高速大増殖タイマー
            const windowTimer = setInterval(spawnFakeWindow, 40);
            chaosTimers.push(windowTimer);

            // 【超重要】7秒後に自動で全てをリセットして最初に戻すタイマー
            const resetTimer = setTimeout(() => {
                // 画面を真っ暗にするブラックアウト演出（0.5秒）
                body.innerHTML = '';
                body.style.backgroundColor = 'black';
                body.className = '';
                
                setTimeout(() => {
                    // ページ構成を復活させてリセット
                    document.body.innerHTML = '<div id="btn-container" class="container"></div>';
                    // スクリプトの再接続用にグローバル変数を再取得
                    location.reload(); // 一番確実に全リセットするためにページを自動リロード
                }, 500);

            }, 7000); // 7秒間カオスが続きます
        }

        // 3. 偽ポップアップウィンドウの生成
        function spawnFakeWindow() {
            const win = document.createElement('div');
            win.className = 'fake-window';
            win.style.left = Math.random() * (window.innerWidth - 300) + 'px';
            win.style.top = Math.random() * (window.innerHeight - 150) + 'px';

            win.innerHTML = `
                <div class="window-header">
                    <span>⚠️ FATAL ERROR</span>
                    <span>×</span>
                </div>
                <div class="window-body">
                    <p style="color:red; margin:0 0 10px 0;">LOOP DETECTED!</p>
                    <p>永遠から逃れることはできない。</p>
                    <button style="width:80px;">OK</button>
                </div>
            `;
            document.body.appendChild(win);
        }

        // 起動処理
        initPeacefulWorld();
        mainLoop();
    </script>
</body>
</html>
